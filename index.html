<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; background: transparent; height: 60px; overflow: hidden; font-family: sans-serif; }
        #ad-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
        /* Loading Spinner while Ad loads */
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #00F5FF; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; position: absolute; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="ad-container">
        <div class="loader" id="loader"></div>
